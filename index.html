<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0aa9f6">
  <meta name="description" content="HTML5 Telegram Mini App игра: волк ловит яйца.">
  <title>Волк ловит яйца</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app" id="app">
    <section class="game-card" aria-label="Игровое поле">
      <div class="hud" id="hud">
        <div class="hud-block">
          <span class="hud-label">Счёт</span>
          <strong id="score">0</strong>
        </div>
        <div class="hud-block">
          <span class="hud-label">Уровень</span>
          <strong id="level">1</strong>
        </div>
        <div class="hud-block">
          <span class="hud-label">Жизни</span>
          <strong id="lives">🥚🥚🥚</strong>
        </div>

        <div class="sound-panel" aria-label="Управление звуком">
          <button class="sound-toggle" id="soundToggle" type="button" aria-label="Включить или выключить звук">🔊</button>
          <label class="volume-label" for="volume">Громкость</label>
          <input id="volume" class="volume" type="range" min="0" max="100" value="55" aria-label="Громкость">
        </div>
      </div>

      <div class="stage" id="stage">
        <img class="background" id="background" src="./assets/wolf-pos-1.png" alt="">
        <canvas id="gameCanvas" width="1448" height="1086" aria-label="Игра Волк ловит яйца"></canvas>

        <div class="message" id="message">
          <div class="message-box">
            <h1>Волк ловит яйца</h1>
            <p>Нажмите на любую курицу, чтобы начать.</p>
            <p class="small">Во время игры нажимайте прямо на куриц 1–4: волк будет переносить корзину к выбранному лотку.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="./game.js"></script>
</body>
</html>
